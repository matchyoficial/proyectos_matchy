# 📂 pubspec.yaml

name: proyectos_matchy

# 🔴 CHINCHE YAML A — nombre del paquete
description: Aplicación Matchy en Flutter
publish_to: "none"

version: 1.0.0+9                    # 🔴 CHINCHE YAML B — versión app

environment:
  sdk: ">=3.0.0 <4.0.0"             # 🔴 CHINCHE YAML C — compatibilidad de Dart/Flutter

dependencies:
  flutter:
    sdk: flutter

  # 🔴 CHINCHE MAPS DEP 1 — abrir Google Maps (Android/iOS)
  url_launcher: ^6.3.0

  # 🌍 NECESARIO para DatePicker en español
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8           # 🔴 CHINCHE YAML D
  google_fonts: ^6.2.1              # 🔴 CHINCHE YAML E

  # ✅ LOGICA SEGURA (cross-platform)
  flutter_riverpod: ^2.6.1          # 🔴 CHINCHE LOGICA A — estado robusto y escalable

  # ✅ PERSISTENCIA LOCAL BASICA
  shared_preferences: ^2.3.2        # 🔴 CHINCHE LOGICA B — guardar datos simples

  # ✅ PASO FOTOS REAL — galería/cámara
  image_picker: ^1.0.7              # 🔴 CHINCHE FOTO 1 — si quieres fijar otra versión, cambia aquí

  # 🔴 CHINCHE YAML F — librerías opcionales
  # http: ^1.2.0
  # provider: ^6.1.2
  # shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0             # 🔴 CHINCHE YAML G — buenas prácticas
  flutter_launcher_icons: ^0.13.1   # 🔴 CHINCHE ICONOS — generador de iconos

flutter:
  uses-material-design: true

  # 🔴 CHINCHE YAML H — REGISTRO DE ASSETS
  assets:
    - assets/images/
    - assets/images/icono_matchy.png

# 🔴 CHINCHE ICONOS B — CONFIGURACIÓN LAUNCHER ICON
flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/icono_matchy.png"
